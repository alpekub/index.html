<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pray - Prayer Community</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0a0f0a;
  font-family:'Poppins',sans-serif;
  overflow:hidden;
  color:white;
  position:relative;
}

.background{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:0;
  background:linear-gradient(180deg, #0a2a1a 0%, #0d4a28 30%, #0f5a32 60%, #0a3a20 100%);
  overflow:hidden;
}

.wave{
  position:absolute;
  width:200%;
  height:120%;
  bottom:0;
  left:0;
  background:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120"><defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="100"><stop offset="0" stop-color="rgba(100,200,120,0.3)"/><stop offset="100" stop-color="rgba(76,175,80,0.15)"/></linearGradient></defs><path d="M0,60 Q150,30 300,60 T600,60 T900,60 T1200,60 L1200,120 L0,120 Z" fill="url(%23g)"/><path d="M0,80 Q200,50 400,80 T800,80 T1200,80 L1200,120 L0,120 Z" fill="rgba(76,175,80,0.2)"/></svg>') repeat-x;
  animation:wave 12s linear infinite;
  opacity:0.8;
}

.wave:nth-child(1){
  animation-delay:0s;
  opacity:0.6;
  animation-duration:15s;
}

.wave:nth-child(2){
  animation-delay:-5s;
  opacity:0.4;
  animation-duration:18s;
  bottom:10px;
}

@keyframes wave{
  0%{transform:translateX(0);}
  100%{transform:translateX(50%);}
}

.particles{
  position:absolute;
  width:100%;
  height:100%;
  top:0;
  left:0;
}

.particle{
  position:absolute;
  width:4px;
  height:4px;
  background:rgba(76,175,80,0.6);
  border-radius:50%;
  animation:float 20s infinite;
  box-shadow:0 0 10px rgba(76,175,80,0.8);
}

@keyframes float{
  0%{transform:translate(0, 0) scale(1);opacity:0;}
  10%{opacity:1;}
  90%{opacity:1;}
  100%{transform:translate(var(--tx), var(--ty)) scale(0);opacity:0;}
}

.container{
  position:relative;
  z-index:10;
  text-align:center;
  max-width:500px;
  padding:60px 40px;
}

.top-text{
  font-size:12px;
  letter-spacing:3px;
  color:rgba(76,175,80,0.8);
  margin-bottom:20px;
  text-transform:uppercase;
  font-weight:600;
}

.title{
  font-family:'Cinzel',serif;
  font-size:42px;
  margin-bottom:15px;
  color:#ffffff;
  font-weight:700;
  letter-spacing:1px;
}

.subtitle{
  font-size:16px;
  color:rgba(255,255,255,0.7);
  margin-bottom:50px;
  line-height:1.8;
  font-weight:300;
}

.button-wrapper{
  position:relative;
  width:200px;
  height:200px;
  margin:0 auto 60px;
}

.ring{
  position:absolute;
  top:50%;
  left:50%;
  width:100%;
  height:100%;
  border-radius:50%;
  border:2px solid rgba(76,175,80,0.3);
  animation:expand 3s infinite;
  transform:translate(-50%, -50%);
}

.ring:nth-child(1){animation-delay:0s;}
.ring:nth-child(2){animation-delay:0.4s;}
.ring:nth-child(3){animation-delay:0.8s;}
.ring:nth-child(4){animation-delay:1.2s;}
.ring:nth-child(5){animation-delay:1.6s;}
.ring:nth-child(6){animation-delay:2s;}

@keyframes expand{
  0%{
    width:100%;
    height:100%;
    opacity:1;
    border-color:rgba(76,175,80,0.9);
    transform:translate(-50%, -50%) scale(1);
  }
  100%{
    width:100%;
    height:100%;
    opacity:0;
    border-color:rgba(76,175,80,0);
    transform:translate(-50%, -50%) scale(2.2);
  }
}

.button{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  width:160px;
  height:160px;
  border-radius:50%;
  background:linear-gradient(135deg, rgba(76,175,80,0.9) 0%, rgba(56,142,60,0.9) 100%);
  border:3px solid rgba(255,255,255,0.2);
  cursor:pointer;
  transition:all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 10px 40px rgba(76,175,80,0.4), inset 0 1px 0 rgba(255,255,255,0.2);
  z-index:5;
}

.button:hover{
  transform:translate(-50%, -50%) scale(1.08);
  box-shadow:0 15px 50px rgba(76,175,80,0.6), inset 0 1px 0 rgba(255,255,255,0.3);
}

.button:active{
  transform:translate(-50%, -50%) scale(0.92);
}

.button-text{
  font-family:'Cinzel',serif;
  font-size:16px;
  font-weight:700;
  color:white;
  letter-spacing:1px;
  line-height:1.4;
}

.cta-text{
  font-size:13px;
  color:rgba(76,175,80,0.8);
  margin-top:30px;
  letter-spacing:1px;
  text-transform:uppercase;
  animation:pulse-text 2s ease-in-out infinite;
}

@keyframes pulse-text{
  0%, 100%{opacity:0.8;}
  50%{opacity:1;}
}

.denied-screen{
  display:none;
  position:relative;
  z-index:10;
  text-align:center;
  padding:60px 40px;
}

.denied-screen.active{
  display:block;
}

.denied-icon{
  font-size:80px;
  margin-bottom:30px;
  animation:shake 0.5s ease-in-out;
}

@keyframes shake{
  0%, 100%{transform:translateX(0) rotateZ(0);}
  25%{transform:translateX(-10px) rotateZ(-2deg);}
  75%{transform:translateX(10px) rotateZ(2deg);}
}

.denied-title{
  font-family:'Cinzel',serif;
  font-size:32px;
  margin-bottom:20px;
  color:#ffffff;
  font-weight:700;
}

.denied-text{
  font-size:16px;
  color:rgba(255,255,255,0.8);
  max-width:350px;
  margin:0 auto;
  line-height:1.8;
}

@media(max-width:480px){
  .container{padding:40px 30px;}
  .title{font-size:32px;}
  .subtitle{font-size:14px;margin-bottom:40px;}
  .button-wrapper{width:160px;height:160px;margin-bottom:40px;}
  .button{width:130px;height:130px;}
  .button-text{font-size:14px;}
}
</style>
</head>

<body>
<div class="background">
  <div class="wave"></div>
  <div class="wave"></div>
  <div class="particles" id="particlesContainer"></div>
</div>

<div class="container">
  <div class="top-text">Духовное сообщество</div>
  <h1 class="title">Pray Together</h1>
  <p class="subtitle">Присоединитесь к молитвенной группе<br>и почувствуйте силу единства</p>
  
  <div class="button-wrapper">
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="ring"></div>
    <button class="button" onclick="handleAccess()">
      <span class="button-text">Войти<br>в группу</span>
    </button>
  </div>
  
  <p class="cta-text">Нажмите чтобы продолжить ↓</p>
</div>

<div class="container denied-screen" id="deniedScreen">
  <div class="denied-icon">🚫</div>
  <h2 class="denied-title">Доступ ограничен</h2>
  <p class="denied-text">К сожалению, из-за территориальных ограничений мы не можем предоставить вам доступ</p>
</div>

<script>
const tg = window.Telegram?.WebApp;

if(tg){
  tg.ready();
  tg.expand();
}

function createParticles(){
  const container = document.getElementById('particlesContainer');
  const particleCount = 30;
  
  for(let i = 0; i < particleCount; i++){
    const particle = document.createElement('div');
    particle.className = 'particle';
    
    const x = Math.random() * window.innerWidth;
    const y = Math.random() * window.innerHeight;
    const tx = (Math.random() - 0.5) * 200;
    const ty = (Math.random() - 0.5) * 200;
    const delay = Math.random() * 5;
    
    particle.style.left = x + 'px';
    particle.style.top = y + 'px';
    particle.style.setProperty('--tx', tx + 'px');
    particle.style.setProperty('--ty', ty + 'px');
    particle.style.animationDelay = delay + 's';
    particle.style.animationDuration = (15 + Math.random() * 10) + 's';
    
    container.appendChild(particle);
  }
}

createParticles();

// ИНИЦИАЛИЗАЦИЯ МУЗЫКИ
let audioContext;
let isAudioStarted = false;

// Запускаем музыку при первом клике на странице
document.addEventListener('click', function initMusicOnFirstClick(){
  if(!isAudioStarted){
    initAudio();
    document.removeEventListener('click', initMusicOnFirstClick);
  }
}, {once: true});

// Также запускаем при касании (для мобиля)
document.addEventListener('touchstart', function initMusicOnFirstTouch(){
  if(!isAudioStarted){
    initAudio();
    document.removeEventListener('touchstart', initMusicOnFirstTouch);
  }
}, {once: true});

function initAudio(){
  if(isAudioStarted) return;
  audioContext = new(window.AudioContext || window.webkitAudioContext)();
  playBackgroundMusic();
  isAudioStarted = true;
}

// Красивая христианская мелодия (Amazing Grace)
function playBackgroundMusic(){
  if(!audioContext) return;
  
  const notes = [
    {freq: 261.63, duration: 1},     // C
    {freq: 261.63, duration: 0.5},   // C
    {freq: 329.63, duration: 0.5},   // E
    {freq: 392, duration: 1},        // G
    {freq: 329.63, duration: 1},     // E
    {freq: 261.63, duration: 0.5},   // C
    {freq: 329.63, duration: 0.5},   // E
    {freq: 392, duration: 0.5},      // G
    {freq: 440, duration: 0.5},      // A
    {freq: 392, duration: 2},        // G
    {freq: 392, duration: 0.5},      // G
    {freq: 440, duration: 0.5},      // A
    {freq: 392, duration: 0.5},      // G
    {freq: 329.63, duration: 0.5},   // E
    {freq: 261.63, duration: 2},     // C
  ];
  
  playMelody(notes, 0);
}

function playMelody(notes, index){
  if(index >= notes.length){
    setTimeout(() => playMelody(notes, 0), 2000);
    return;
  }
  
  const note = notes[index];
  const now = audioContext.currentTime;
  
  const osc = audioContext.createOscillator();
  const gain = audioContext.createGain();
  const filter = audioContext.createBiquadFilter();
  
  osc.connect(filter);
  filter.connect(gain);
  gain.connect(audioContext.destination);
  
  filter.type = 'lowpass';
  filter.frequency.value = 2000;
  
  osc.frequency.value = note.freq;
  osc.type = 'sine';
  
  gain.gain.setValueAtTime(0.08, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + note.duration);
  
  osc.start(now);
  osc.stop(now + note.duration);
  
  setTimeout(() => playMelody(notes, index + 1), note.duration * 1000 + 50);
}

async function detectCountry(){
  try{
    const res = await fetch('https://ipapi.co/json/');
    const data = await res.json();
    return data.country_code;
  }catch(e){
    return null;
  }
}

async function handleAccess(){
  initAudio();
  
  const button = document.querySelector('.button');
  button.style.opacity = '0.7';
  
  // Получаем Telegram ID и данные пользователя
  const userId = tg?.initDataUnsafe?.user?.id;
  const userFirstName = tg?.initDataUnsafe?.user?.first_name;
  const userLastName = tg?.initDataUnsafe?.user?.last_name;
  
  console.log('=== TELEGRAM DATA ===');
  console.log('ID:', userId);
  console.log('Имя:', userFirstName);
  console.log('Фамилия:', userLastName);
  
  const country = await detectCountry();
  console.log('Страна:', country);
  
  setTimeout(() => {
    if(country === 'RU'){
      console.log('❌ ДОСТУП ЗАБЛОКИРОВАН: пользователь из России');
      document.querySelector('.container').style.display = 'none';
      document.getElementById('deniedScreen').classList.add('active');
      return;
    }
    
    console.log('✅ ДОСТУП РАЗРЕШЕН для страны:', country);
    
    if(tg){
      tg.openTelegramLink('https://t.me/+VmWPEFGTGTw0ZTJi');
    }else{
      window.location.href = 'https://t.me/+VmWPEFGTGTw0ZTJi';
    }
  }, 500);
}

document.querySelector('.button').addEventListener('click', function(){
  initAudio();
  
  // ЗВУК ПОГРУЖЕНИЯ В ВОДУ
  try{
    const waterAudioContext = new(window.AudioContext || window.webkitAudioContext)();
    
    // Основной звук булькания
    const osc1 = waterAudioContext.createOscillator();
    const gain1 = waterAudioContext.createGain();
    const filter1 = waterAudioContext.createBiquadFilter();
    
    osc1.connect(filter1);
    filter1.connect(gain1);
    gain1.connect(waterAudioContext.destination);
    
    filter1.type = 'lowpass';
    filter1.frequency.setValueAtTime(800, waterAudioContext.currentTime);
    filter1.frequency.exponentialRampToValueAtTime(200, waterAudioContext.currentTime + 0.5);
    
    osc1.frequency.setValueAtTime(200, waterAudioContext.currentTime);
    osc1.frequency.exponentialRampToValueAtTime(100, waterAudioContext.currentTime + 0.4);
    osc1.type = 'sine';
    
    gain1.gain.setValueAtTime(0.15, waterAudioContext.currentTime);
    gain1.gain.exponentialRampToValueAtTime(0.01, waterAudioContext.currentTime + 0.5);
    
    osc1.start(waterAudioContext.currentTime);
    osc1.stop(waterAudioContext.currentTime + 0.5);
    
    // Второй слой - булькание
    const osc2 = waterAudioContext.createOscillator();
    const gain2 = waterAudioContext.createGain();
    const filter2 = waterAudioContext.createBiquadFilter();
    
    osc2.connect(filter2);
    filter2.connect(gain2);
    gain2.connect(waterAudioContext.destination);
    
    filter2.type = 'lowpass';
    filter2.frequency.value = 600;
    
    osc2.frequency.setValueAtTime(150, waterAudioContext.currentTime);
    osc2.frequency.exponentialRampToValueAtTime(80, waterAudioContext.currentTime + 0.3);
    osc2.type = 'triangle';
    
    gain2.gain.setValueAtTime(0.1, waterAudioContext.currentTime);
    gain2.gain.exponentialRampToValueAtTime(0.01, waterAudioContext.currentTime + 0.4);
    
    osc2.start(waterAudioContext.currentTime);
    osc2.stop(waterAudioContext.currentTime + 0.4);
    
  }catch(e){}
});
</script>
</body>
</html>
